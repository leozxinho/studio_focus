<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Studio Focus</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="admin.css">
    <style>
        body {
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 102, 255, 0.1) 0%, transparent 80%);
        }
        .login-card {
            border: 1px solid var(--bd);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }
        .input-focus:focus {
            border-color: var(--pu);
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md animate-fade">
        <div class="text-center mb-8">
            <h1 class="font-bebas text-5xl tracking-widest text-white">STUDIO <span class="text-pu">FOCUS</span></h1>
            <p class="text-mt text-sm uppercase tracking-widest mt-2">Painel Administrativo</p>
        </div>

        <div class="glass p-8 rounded-2xl login-card">
            <form id="login-form" class="space-y-6">
                <div>
                    <label for="username" class="block text-xs font-bold text-mt uppercase tracking-widest mb-2">Usuário</label>
                    <input type="text" id="username" required 
                        class="w-full bg-s1 border border-bd2 rounded-xl px-4 py-3 text-white outline-none input-focus transition-all"
                        placeholder="admin">
                </div>
                <div>
                    <label for="password" class="block text-xs font-bold text-mt uppercase tracking-widest mb-2">Senha</label>
                    <input type="password" id="password" required 
                        class="w-full bg-s1 border border-bd2 rounded-xl px-4 py-3 text-white outline-none input-focus transition-all"
                        placeholder="••••••••">
                </div>
                
                <div id="error-message" class="hidden text-red-500 text-sm text-center font-medium bg-red-500/10 py-2 rounded-lg border border-red-500/20">
                    Credenciais inválidas. Tente novamente.
                </div>

                <button type="submit" 
                    class="w-full bg-pu hover:bg-pu2 text-white font-bold py-4 rounded-xl shadow-lg shadow-pu/20 transition-all active:scale-[0.98]">
                    ENTRAR NO PAINEL
                </button>
            </form>
        </div>

        <div class="text-center mt-8">
            <a href="../" class="text-mt hover:text-white text-sm transition-all">← Voltar para o site</a>
        </div>
    </div>

    <script src="admin.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-message');

            if (login(user, pass)) {
                // Success - logic handled in admin.js
            } else {
                errorMsg.classList.remove('hidden');
                setTimeout(() => {
                    errorMsg.classList.add('hidden');
                }, 3000);
            }
        });
    </script>
</body>
</html>
